<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Personal Details</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <h1>Personal Details</h1>

      <input type="hidden" id="recordId" />

      <div class="field">
        <input type="text" id="name" placeholder="Name" />
        <span class="err" id="err-name"></span>
      </div>
      <div class="field">
        <input type="tel" id="number" placeholder="Number" />
        <span class="err" id="err-number"></span>
      </div>
      <div class="field">
        <input type="email" id="email" placeholder="Email" />
        <span class="err" id="err-email"></span>
      </div>
      <div class="field">
        <select id="gender">
          <option value="" disabled selected>Gender</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
        <span class="err" id="err-gender"></span>
      </div>
      <div class="field">
        <textarea id="address" placeholder="Address" rows="3"></textarea>
        <span class="err" id="err-address"></span>
      </div>

      <div class="file-upload" id="fileUploadBtn">
        <input type="file" id="fileInput" hidden accept=".pdf,.doc,.docx,.txt" />
        <span id="fileName">📄 Upload Document</span>
      </div>
      <div id="docPreview" class="doc-preview" style="display:none">
        <span id="docInfo"></span>
        <button id="removeDocBtn">✕</button>
      </div>

      <div class="btn-group">
        <button id="submitBtn">Submit</button>
        <button id="editBtn">Edit</button>
        <button id="deleteBtn">Delete</button>
      </div>

      <div class="search-row">
        <input type="text" id="searchInput" placeholder="Enter number to search" />
        <button id="searchBtn">Search</button>
      </div>

      <p id="message"></p>
    </div>

    <!-- Records Grid -->
    <div class="grid-container" id="gridContainer" style="display:none">
      <h2>Saved Records</h2>
      <table id="recordsTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Number</th>
            <th>Email</th>
            <th>Gender</th>
            <th>Address</th>
            <th>Document</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="recordsBody"></tbody>
      </table>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
